spring:
  application:
    name: projetoApiDeVendasEmSpring
  flyway:
    enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/${DATABASE_NAME}?options=-c%20TimeZone=UTC
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone : UTC
jwt:
  secret-key: ${JWT_KEY}
  expiration: 1800000

admin-user:
  password: ${ADMIN_PASSWORD}
  email: ${ADMIN_EMAIL}
